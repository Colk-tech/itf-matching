<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>本当にマッチしたい方はこちら | 筑波大生特化マッチングアプリ</title>

    <link rel="canonical"
          href="https://itf-matching.colk-tech.workers.dev/recommended.html"/>

    <meta
            name="description"
            content="筑波大生特化マッチングアプリからリンクしている、筑波の大学生向けマッチングサービス UniDrop のご案内。"
    />
    <meta name="robots" content="noindex,follow"/>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Noto+Serif+JP:wght@500;600&display=swap"
    />

    <style>
        :root {
            --bg: #f7f4ef;
            --surface: #ffffff;
            --text: #1c1c1c;
            --text-muted: #6b6b6b;
            --border: #e4dfd6;
            --accent-dark: #a42e48;
            --shadow-sm: 0 1px 2px rgba(28, 28, 28, 0.04);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", -apple-system,
            BlinkMacSystemFont, "Yu Gothic", "Noto Sans JP", system-ui,
            sans-serif;
            font-feature-settings: "palt";
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app {
            flex: 1;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: 48px 24px 32px;
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand__eyebrow {
            font-size: 0.72rem;
            letter-spacing: 0.28em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 0 0 10px;
        }

        .brand__title {
            font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
            font-weight: 500;
            font-size: clamp(1.55rem, 4vw, 2.1rem);
            letter-spacing: 0.03em;
            margin: 0;
        }

        .brand__title a {
            color: inherit;
            text-decoration: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 40px 28px;
        }

        .unidrop-promo {
            padding: 28px 22px;
            background: #fff8f1;
            border: 1px solid #f2e5d7;
            border-radius: 14px;
            text-align: center;
        }

        .unidrop-promo__heading {
            font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1d130d;
            margin: 0 0 20px;
            letter-spacing: 0.04em;
        }

        .unidrop-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 14px 36px;
            background: #b5531a;
            color: #fff8f1;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 12px 26px -10px rgba(181, 83, 26, 0.55);
            transition:
                    background 0.15s ease,
                    transform 0.1s ease,
                    box-shadow 0.15s ease;
        }

        .unidrop-btn:hover {
            background: #4a2f1d;
            box-shadow: 0 14px 30px -10px rgba(74, 47, 29, 0.45);
        }

        .unidrop-btn:active {
            transform: translateY(1px);
        }

        .unidrop-btn__title {
            font-family: "DM Sans", "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
        }

        .unidrop-btn__sub {
            font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
            font-weight: 500;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            opacity: 0.88;
        }

        .unidrop-promo__note {
            margin: 20px auto 0;
            max-width: 34em;
            font-size: 0.92rem;
            line-height: 1.8;
            color: #4a2f1d;
            text-align: left;
        }

        .back-link {
            margin: 28px auto 0;
            text-align: center;
            font-size: 0.9rem;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.15s ease;
        }

        .back-link a:hover {
            color: var(--accent-dark);
        }

        .site-footer {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.78rem;
            text-align: center;
            line-height: 1.9;
        }

        .site-footer p {
            margin: 4px 0;
        }

        .site-footer a {
            color: var(--text-muted);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .site-footer a:hover {
            color: var(--text);
        }

        @media (max-width: 480px) {
            .app {
                padding-top: 32px;
            }

            .card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="brand">
        <p class="brand__eyebrow">University of Tsukuba</p>
        <h1 class="brand__title">
            <a href="/">筑波大生特化マッチングアプリ</a>
        </h1>
    </header>

    <main class="card">
        <aside class="unidrop-promo">
            <p class="unidrop-promo__heading">本当にマッチしたい方はこちら</p>
            <a
                    class="unidrop-btn"
                    href="https://unidropjp.com/"
                    target="_blank"
                    rel="noopener noreferrer"
            >
                <span class="unidrop-btn__title">UniDrop</span>
                <span class="unidrop-btn__sub">探さない。届く。</span>
            </a>
            <p class="unidrop-promo__note">
                つられた人がかわいそうという気持ちと、先駆者へのリスペクトのために配置しているだけです。マジで何の関係もなく、勝手にリンクしているだけです。特に報酬も受け取っていませんし、頼まれてもいません。
            </p>
        </aside>

        <p class="back-link">
            <a href="/">← マッチングに戻る</a>
        </p>
    </main>

    <footer class="site-footer">
        <p>
            inspired by
            <a href="https://hutinoatari.github.io/cheapTransfer/">最安経路検索</a>
            /
            <a href="https://uec-matching.mimifuwacc.workers.dev/"
            >電通大生専用マッチングアプリ</a
            >
        </p>
        <p>
            © 2026 mimifuwacc
            (<a href="https://uec-matching.mimifuwacc.workers.dev/">Original</a>)
            / © 2026 <a href="https://github.com/Colk-tech">Colk-tech</a>
        </p>
        <p>
            Licensed under the
            <a href="/assets/LICENSES.txt">MIT License</a>
        </p>
    </footer>
</div>
</body>
</html>
