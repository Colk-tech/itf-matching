<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>筑波大生専用マッチングアプリ</title>

    <meta
      name="description"
      content="筑波大生による、筑波大生のためのマッチングアプリ"
    />

    <meta property="og:title" content="筑波大生専用マッチングアプリ" />
    <meta
      property="og:description"
      content="筑波大生による、筑波大生のためのマッチングアプリ"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="筑波大生専用マッチングアプリ" />

    <meta name="twitter:title" content="筑波大生専用マッチングアプリ" />
    <meta
      name="twitter:description"
      content="筑波大生による、筑波大生のためのマッチングアプリ"
    />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <header>
      <h1>筑波大生専用マッチングアプリ</h1>
    </header>
    <main>
      <section id="question">
        <p>あなたは筑波大生ですか？</p>
        <button id="yes">はい</button>
        <button id="no">いいえ</button>
      </section>
      <section id="gender-self" style="display: none">
        <p>あなたの性別を教えてください</p>
        <div style="display: flex; align-items: center; gap: 1em; flex-wrap: wrap">
          <label><input type="radio" name="gender-self" value="男" />男</label>
          <label><input type="radio" name="gender-self" value="女" />女</label>
          <label>
            <input type="radio" name="gender-self" value="other" />その他（自由記述）
          </label>
          <input
            type="text"
            id="gender-self-other"
            aria-label="その他の性別（自由記述）"
            disabled
          />
        </div>
        <button id="gender-self-submit">決定</button>
      </section>
      <section id="gender-match" style="display: none">
        <p>あなたがマッチしたい性別を教えてください</p>
        <div style="display: flex; align-items: center; gap: 1em; flex-wrap: wrap">
          <label><input type="radio" name="gender-match" value="男" />男</label>
          <label><input type="radio" name="gender-match" value="女" />女</label>
          <label>
            <input type="radio" name="gender-match" value="other" />その他（自由記述）
          </label>
          <input
            type="text"
            id="gender-match-other"
            aria-label="その他のマッチしたい性別（自由記述）"
            disabled
          />
        </div>
        <button id="gender-match-submit">決定</button>
      </section>
      <section id="retry" style="display: none">
        <button id="retry">再マッチング</button>
        <button id="restart">最初からやり直す</button>
      </section>
      <section id="result" style="display: none">
        <p id="result-text"></p>
      </section>
    </main>

    <hr />

    <footer>
      <p>
        inspired by
        <a href="https://hutinoatari.github.io/cheapTransfer/">最安経路検索</a>
        and
        <a href="https://uec-matching.mimifuwacc.workers.dev/">電通大生専用マッチングアプリ</a>
      </p>

      <p>
        © 2026 mimifuwacc (<a href="https://uec-matching.mimifuwacc.workers.dev/">Original</a>)
        © 2026 <a href="https://github.com/Colk-tech">Colk-tech</a>
      </p>

      <p>
        Licensed under the
        <a href="/assets/LICENSES.txt">MIT License</a>
      </p>
    </footer>

    <script>
      const questionSection = document.querySelector("#question");
      const yesButton = questionSection.querySelector("#yes");
      const noButton = questionSection.querySelector("#no");

      const genderSelfSection = document.querySelector("#gender-self");
      const genderSelfRadios = genderSelfSection.querySelectorAll(
        'input[name="gender-self"]',
      );
      const genderSelfOtherInput =
        genderSelfSection.querySelector("#gender-self-other");
      const genderSelfSubmit =
        genderSelfSection.querySelector("#gender-self-submit");

      const genderMatchSection = document.querySelector("#gender-match");
      const genderMatchRadios = genderMatchSection.querySelectorAll(
        'input[name="gender-match"]',
      );
      const genderMatchOtherInput =
        genderMatchSection.querySelector("#gender-match-other");
      const genderMatchSubmit =
        genderMatchSection.querySelector("#gender-match-submit");

      const retrySection = document.querySelector("#retry");
      const retryButton = retrySection.querySelector("#retry");
      const restartButton = retrySection.querySelector("#restart");

      const resultSection = document.querySelector("#result");
      const resultText = resultSection.querySelector("#result-text");

      const answers = {
        isTsukubaStudent: null,
        genderSelf: null,
        genderMatch: null,
      };

      const showOnly = (sectionToShow) => {
        for (const section of [
          questionSection,
          genderSelfSection,
          genderMatchSection,
          retrySection,
          resultSection,
        ]) {
          section.style.display = section === sectionToShow ? "block" : "none";
        }
      };

      const askGenderSelf = () => {
        showOnly(genderSelfSection);
      };

      const askGenderMatch = () => {
        showOnly(genderMatchSection);
      };

      const renderMatchResult = () => {
        if (answers.genderMatch !== "男") {
          resultText.textContent = "マッチが成立しませんでした";
          return;
        }
        if (answers.genderSelf === "女") {
          resultText.textContent = "あなたにマッチする人が見つかりました: ";

          const profileLink = document.createElement("a");
          profileLink.href = "https://x.com/Colk_";
          profileLink.textContent = "こるく";
          profileLink.target = "_blank";
          profileLink.rel = "noopener noreferrer";
          resultText.appendChild(profileLink);

          resultText.appendChild(document.createTextNode(" ("));

          const dmLink = document.createElement("a");
          dmLink.href =
            "https://x.com/messages/compose?recipient_id=1143516189743652864";
          dmLink.textContent = "チャットする";
          dmLink.target = "_blank";
          dmLink.rel = "noopener noreferrer";
          resultText.appendChild(dmLink);

          resultText.appendChild(document.createTextNode(")"));
          return;
        }
        resultText.textContent = "あなたにマッチする人は見つかりませんでした";
      };

      const match = async () => {
        resultSection.style.display = "block";
        genderMatchSection.style.display = "none";
        questionSection.style.display = "none";
        resultText.textContent = "マッチング中";

        await new Promise((resolve) => {
          for (let i = 0; i < 5; i++) {
            setTimeout(
              () => {
                resultText.textContent += ".";
                if (i === 4) resolve();
              },
              (i + 1) * 500,
            );
          }
        });

        retrySection.style.display = "block";

        renderMatchResult();
      };

      yesButton.addEventListener("click", () => {
        answers.isTsukubaStudent = true;
        askGenderSelf();
      });

      noButton.addEventListener("click", () => {
        answers.isTsukubaStudent = false;
        askGenderSelf();
      });

      const readGenderChoice = (radios, otherInput) => {
        const selected = Array.from(radios).find((radio) => radio.checked);
        if (!selected) return null;
        if (selected.value !== "other") return selected.value;
        const other = otherInput.value.trim();
        return other || null;
      };

      const bindOtherToggle = (radios, otherInput) => {
        for (const radio of radios) {
          radio.addEventListener("change", () => {
            const isOther =
              Array.from(radios).find((r) => r.checked)?.value === "other";
            otherInput.disabled = !isOther;
            if (isOther) otherInput.focus();
          });
        }
      };

      bindOtherToggle(genderSelfRadios, genderSelfOtherInput);
      bindOtherToggle(genderMatchRadios, genderMatchOtherInput);

      genderSelfSubmit.addEventListener("click", () => {
        const value = readGenderChoice(genderSelfRadios, genderSelfOtherInput);
        if (!value) return;
        answers.genderSelf = value;
        askGenderMatch();
      });

      genderMatchSubmit.addEventListener("click", async () => {
        const value = readGenderChoice(
          genderMatchRadios,
          genderMatchOtherInput,
        );
        if (!value) return;
        answers.genderMatch = value;
        await match();
      });

      retryButton.addEventListener("click", async () => {
        await match();
      });

      restartButton.addEventListener("click", () => {
        answers.isTsukubaStudent = null;
        answers.genderSelf = null;
        answers.genderMatch = null;
        for (const radio of [...genderSelfRadios, ...genderMatchRadios]) {
          radio.checked = false;
        }
        genderSelfOtherInput.value = "";
        genderSelfOtherInput.disabled = true;
        genderMatchOtherInput.value = "";
        genderMatchOtherInput.disabled = true;
        showOnly(questionSection);
      });
    </script>
  </body>
</html>
